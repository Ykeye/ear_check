<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ear Training - Cents Game</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #111;
    color: #eee;
  }
  .container {
    margin-top: 50px;
  }
  button {
    padding: 10px 20px;
    margin: 10px;
    font-size: 16px;
    cursor: pointer;
  }
  input[type=range] {
    width: 300px;
  }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="container" id="startScreen">
  <h1>🎵 Cents Ear Training</h1>
  <p>Max cents difference: <span id="centsValue">25</span></p>
  <input type="range" min="10" max="50" value="25" id="centsSlider">
  <br>
  <button onclick="startGame()">Start Game</button>
</div>

<div class="container hidden" id="gameScreen">
  <h2 id="roundLabel">Round 1 / 5</h2>
  <button onclick="playCurrent()">▶ Play</button>
  <br>
  <button onclick="answer('same')">Same</button>
  <button onclick="answer('first')">First Higher</button>
  <button onclick="answer('second')">Second Higher</button>
</div>

<div class="container hidden" id="resultScreen">
  <h2>Results</h2>
  <div id="resultsList"></div>
  <h3 id="score"></h3>
  <button onclick="restart()">Restart</button>
</div>

<script>
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let rounds = [];
let currentRound = 0;
let maxCents = 15;

document.getElementById("centsSlider").oninput = (e) => {
  document.getElementById("centsValue").innerText = e.target.value;
};

function randomBetween(min, max) {
  return Math.random() * (max - min) + min;
}

function centsToRatio(cents) {
  return Math.pow(2, cents / 1200);
}

function createRound() {
  let baseFreq = randomBetween(220, 880);

  let type = ["same", "first", "second"][Math.floor(Math.random() * 3)];

  let cents = maxCents;

  let f1 = baseFreq;
  let f2 = baseFreq;

  if (type === "first") {
    f1 = baseFreq * centsToRatio(cents);
  } else if (type === "second") {
    f2 = baseFreq * centsToRatio(cents);
  }

  return { f1, f2, correct: type, cents: cents.toFixed(1) };
}

function playTone(freq, duration = 1.4) {
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = freq;

  let now = audioCtx.currentTime;

  // smoother envelope
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.25, now + 0.15); // slower attack
  gain.gain.setValueAtTime(0.25, now + duration - 0.2);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(now);
  osc.stop(now + duration);
}

function playPair(f1, f2) {
  playTone(f1, 0.7);
  setTimeout(() => playTone(f2, 0.7), 900);
}

function playCurrent() {
  let r = rounds[currentRound];
  playPair(r.f1, r.f2);
}

function startGame() {
  maxCents = parseInt(document.getElementById("centsSlider").value);

  rounds = [];
  currentRound = 0;

  for (let i = 0; i < 5; i++) {
    rounds.push(createRound());
  }

  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");

  updateRound();
}

function updateRound() {
  document.getElementById("roundLabel").innerText =
    `Round ${currentRound + 1} / 5`;
}

function answer(choice) {
  let r = rounds[currentRound];
  r.user = choice;
  r.correctFlag = (choice === r.correct);

  currentRound++;

  if (currentRound >= 5) {
    showResults();
  } else {
    updateRound();
  }
}

function showResults() {
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.remove("hidden");

  let list = document.getElementById("resultsList");
  list.innerHTML = "";

  let score = 0;

  rounds.forEach((r, i) => {
    if (r.correctFlag) score++;

    let diffHz = Math.abs(r.f1 - r.f2).toFixed(2);

    let card = document.createElement("div");

    card.style.margin = "12px auto";
    card.style.padding = "14px";
    card.style.maxWidth = "420px";
    card.style.borderRadius = "12px";
    card.style.background = r.correctFlag ? "#12351f" : "#3a1a1a";
    card.style.border = r.correctFlag ? "1px solid #2ecc71" : "1px solid #e74c3c";
    card.style.textAlign = "left";

    card.innerHTML = `
      <div style="font-size:18px; font-weight:bold; margin-bottom:8px;">
        Round ${i + 1}
      </div>

      <div style="margin-bottom:6px;">
        <b>Correct:</b> ${r.correct.toUpperCase()}
      </div>

      <div style="margin-bottom:6px;">
        <b>Your answer:</b> ${r.user ? r.user.toUpperCase() : "—"}
      </div>

      <div style="font-size:20px; font-weight:bold; margin:10px 0;">
        ${r.correctFlag ? "✅ Correct" : "❌ Wrong"}
      </div>

      <div style="font-size:12px; opacity:0.75;">
        ${r.cents} cents | A: ${r.f1.toFixed(2)} Hz | B: ${r.f2.toFixed(2)} Hz | Δ ${diffHz} Hz
      </div>
    `;

    list.appendChild(card);
  });

  document.getElementById("score").innerText = `Score: ${score} / 5`;
}

function restart() {
  document.getElementById("resultScreen").classList.add("hidden");
  document.getElementById("startScreen").classList.remove("hidden");
}
</script>

</body>
</html>
